<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#09090b"/>
<title>Ooha's OS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#09090b;color:#e4e4e7;font-family:'DM Mono','Courier New',monospace;overflow-x:hidden;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#3f3f46;border-radius:2px;}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;}
.header{background:#111113;border-bottom:1px solid #27272a;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-title{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;letter-spacing:-0.5px;color:#fafafa;}
.header-sub{font-size:9px;color:#52525b;letter-spacing:2px;margin-top:1px;}
.header-date{text-align:right;font-size:11px;color:#a1a1aa;}
.header-week{font-size:9px;color:#52525b;margin-top:2px;}
.nav{display:flex;background:#111113;border-bottom:1px solid #27272a;position:sticky;top:57px;z-index:99;}
.nav-btn{flex:1;background:none;border:none;border-bottom:2px solid transparent;padding:11px 4px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:#52525b;cursor:pointer;transition:all 0.2s;}
.nav-btn.active{color:#fafafa;border-bottom-color:#4ade80;}
.content{padding:16px;flex:1;}
.section{background:#111113;border:1px solid #27272a;border-radius:12px;padding:14px 15px;margin-bottom:10px;}
.section-title{font-size:9px;letter-spacing:2px;font-weight:600;margin-bottom:10px;}
.check-item{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #1f1f23;cursor:pointer;transition:opacity 0.15s;}
.check-item:last-child{border-bottom:none;padding-bottom:0;}
.check-item:active{opacity:0.7;}
.check-box-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all 0.18s;flex-shrink:0;}
.check-label{font-size:13px;transition:all 0.18s;}
.check-sub{font-size:10px;color:#52525b;margin-top:2px;}
.progress-card{background:#111113;border:1px solid #27272a;border-radius:12px;padding:15px;margin-bottom:10px;display:flex;align-items:center;gap:15px;}
.ring-wrap{position:relative;width:76px;height:76px;flex-shrink:0;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:17px;}
.progress-title{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;}
.progress-sub{font-size:11px;color:#71717a;margin-top:4px;}
.mvd-toggle{margin-top:8px;font-size:9px;letter-spacing:1.5px;padding:4px 9px;border-radius:5px;border:1px solid #3f3f46;background:#27272a;color:#71717a;cursor:pointer;font-family:'DM Mono',monospace;transition:all 0.2s;}
.mvd-toggle.on{background:#1c1a0444;border-color:#fef08a44;color:#fef08a;}
.mvd-box{background:#1c1a04;border:1px solid #fef08a33;border-radius:10px;padding:12px 15px;margin-bottom:10px;font-size:11px;color:#fef08a;line-height:1.9;}
.steps-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #1f1f23;}
.step-btn{width:38px;height:38px;border-radius:8px;border:none;font-size:20px;cursor:pointer;font-family:inherit;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.step-btn:active{transform:scale(0.93);}
.step-val{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;text-align:center;min-width:64px;}
.step-unit{font-size:9px;color:#52525b;text-align:center;}
.streak-grid{display:flex;gap:5px;margin-bottom:18px;}
.streak-bar{flex:1;text-align:center;}
.streak-bar-label{font-size:9px;color:#52525b;margin-bottom:5px;}
.streak-bar-fill{height:64px;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:6px;position:relative;overflow:hidden;border:1px solid #1f1f23;transition:all 0.4s;}
.streak-bar-num{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;position:relative;}
.streak-bar-den{font-size:8px;color:#3f3f46;margin-top:2px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-card{background:#111113;border:1px solid #27272a;border-radius:10px;padding:14px;text-align:center;}
.stat-num{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;}
.stat-label{font-size:9px;color:#52525b;margin-top:3px;letter-spacing:1px;}
.month-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.month-nav{background:none;border:1px solid #27272a;border-radius:6px;width:32px;height:32px;color:#a1a1aa;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.month-title{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day-label{font-size:8px;color:#52525b;text-align:center;padding-bottom:4px;letter-spacing:1px;}
.cal-cell{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:1px solid transparent;transition:all 0.15s;position:relative;}
.cal-cell:active{opacity:0.7;}
.cal-num{font-size:10px;font-weight:500;}
.cal-dot{width:4px;height:4px;border-radius:50%;margin-top:2px;}
.month-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.month-bar-label{font-size:10px;color:#a1a1aa;width:70px;flex-shrink:0;}
.month-bar-track{flex:1;height:8px;background:#27272a;border-radius:4px;overflow:hidden;}
.month-bar-fill{height:100%;border-radius:4px;transition:width 0.5s ease;}
.month-bar-pct{font-size:10px;color:#52525b;width:32px;text-align:right;flex-shrink:0;}
.eod-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #1f1f23;}
.eod-row:last-child{border-bottom:none;}
.eod-q{font-size:12px;color:#a1a1aa;}
.rule-card{background:#111113;border:1px solid #27272a;border-radius:10px;padding:14px 15px;font-size:12px;color:#71717a;line-height:1.9;}
.fade-in{animation:fadeIn 0.35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.day-detail{background:#18181b;border:1px solid #27272a;border-radius:10px;padding:13px 15px;margin-top:10px;}
.day-detail-title{font-size:10px;letter-spacing:2px;color:#52525b;margin-bottom:10px;}
.detail-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:12px;}
.detail-label{color:#71717a;}
.detail-val{font-size:13px;}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:#18181b;border:1px solid #3f3f46;border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:22px 18px 40px;animation:slideUp 0.25s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;margin-bottom:3px;}
.modal-sub{font-size:10px;color:#52525b;margin-bottom:14px;}
.modal-input{width:100%;background:#09090b;border:1px solid #3f3f46;border-radius:8px;padding:11px 12px;color:#e4e4e7;font-family:'DM Mono',monospace;font-size:13px;outline:none;resize:none;line-height:1.6;}
.modal-input:focus{border-color:#60a5fa;}
.modal-actions{display:flex;gap:8px;margin-top:12px;}
.modal-btn{flex:1;padding:12px;border-radius:8px;border:none;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all 0.15s;}
.modal-btn:active{opacity:0.8;}
.modal-btn-cancel{background:#27272a;color:#71717a;}
.modal-btn-save{background:#4ade80;color:#052e16;font-weight:700;}
/* Workout chips */
.workout-day-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #1f1f23;}
.workout-day-row:last-child{border-bottom:none;}
.workout-day-lbl{font-size:11px;color:#71717a;width:30px;flex-shrink:0;}
.chips-scroll{display:flex;gap:5px;overflow-x:auto;flex:1;padding:2px 0;scrollbar-width:none;}
.chips-scroll::-webkit-scrollbar{display:none;}
.chip{padding:5px 9px;border-radius:20px;font-size:10px;border:1px solid #27272a;background:#18181b;color:#71717a;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.15s;}
.chip:active{opacity:0.7;}
.chip.on{border-color:#4ade8066;background:#052e16;color:#4ade80;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="header-title">OOHA'S OS</div>
      <div class="header-sub">GOAL OPERATING SYSTEM</div>
    </div>
    <div class="header-date" id="hdrDate"></div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showView('today')">TODAY</button>
    <button class="nav-btn" onclick="showView('week')">WEEKLY</button>
    <button class="nav-btn" onclick="showView('streak')">STREAK</button>
    <button class="nav-btn" onclick="showView('month')">MONTHLY</button>
  </div>
  <div class="content" id="content"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" style="display:none;">
  <div class="modal-box" id="modalBox">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-sub" id="modalSub"></div>
    <textarea class="modal-input" id="modalInput" rows="3"></textarea>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">CANCEL</button>
      <button class="modal-btn modal-btn-save" onclick="saveModal()">SAVE</button>
    </div>
  </div>
</div>

<script>
// ── Storage ───────────────────────────────────────────────────────────
var S={
  get:function(k){try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;}},
  set:function(k,v){localStorage.setItem(k,JSON.stringify(v));}
};

// ── Defaults ──────────────────────────────────────────────────────────
var DEF_AIPM=[
  'Learn one PM concept + write a 1-para summary',
  'Build a PRD or user story map',
  'Do a product teardown (any AI tool)',
  'Ship something small — tool, case study, or LinkedIn post'
];
var DEF_EB1A=[
  'Brain dump master resume — all awards, impact, numbers',
  'Refine master resume + identify EB1A criteria',
  'Draft tailored resume + LinkedIn update',
  'Work on one EB1A pillar (letters, speaking, publications)'
];
var WTYPES=['💪 Strength','🧘 Yoga','🏃 Run','🚴 Cycling','🤸 Pilates','🏊 Swim','🚶 Walk','😴 Rest'];
var DEF_SCHED={Mon:'💪 Strength',Tue:'🧘 Yoga',Wed:'💪 Strength',Thu:'🧘 Yoga',Fri:'💪 Strength',Sat:'🧘 Yoga',Sun:'😴 Rest'};
var DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

// ── Data accessors ────────────────────────────────────────────────────
function aipmThemes(){return S.get('aipmT')||DEF_AIPM.slice();}
function eb1aThemes(){return S.get('eb1aT')||DEF_EB1A.slice();}
function wSched(){return S.get('wSched')||JSON.parse(JSON.stringify(DEF_SCHED));}
function getChecks(){return S.get('checks')||{};}
function setChecks(c){S.set('checks',c);}
function getSteps(k){return parseInt(S.get('steps_'+k)||0);}
function setSteps(k,v){S.set('steps_'+k,v);}
function getWF(){return S.get('wf')||{};}
function setWF(w){S.set('wf',w);}

// ── Date utils ────────────────────────────────────────────────────────
function todayKey(){return new Date().toISOString().split('T')[0];}
function dayAbbr(d){return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][(d||new Date()).getDay()];}
function weekNum(){var d=new Date(),s=new Date(d.getFullYear(),0,1);return((Math.ceil(((d-s)/86400000+s.getDay()+1)/7)-1)%4);}
function fmtDate(d){return d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});}
function fmtMonth(y,m){return new Date(y,m,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});}
function dayData(dk){var c=getChecks();return{meditate:!!c[dk+'_meditate'],workout:!!c[dk+'_workout'],aipm:!!c[dk+'_aipm'],eb1a:!!c[dk+'_eb1a'],steps:getSteps(dk)};}
function dayScore(dk){var d=dayData(dk);return(d.meditate?1:0)+(d.workout?1:0)+(d.aipm?1:0)+(d.eb1a?1:0)+(d.steps>=6000?1:0);}

// ── State ─────────────────────────────────────────────────────────────
var VIEW='today';
var MVD=false;
var CAL_Y=new Date().getFullYear();
var CAL_M=new Date().getMonth();
var SEL_DAY=null;
var MODAL_CTX=null;

// ── Header ────────────────────────────────────────────────────────────
function renderHeader(){
  document.getElementById('hdrDate').innerHTML='<div>'+fmtDate(new Date())+'</div><div class="header-week">Week '+(weekNum()+1)+' theme</div>';
}

// ── Router ────────────────────────────────────────────────────────────
function showView(v){
  VIEW=v;
  document.querySelectorAll('.nav-btn').forEach(function(b,i){b.classList.toggle('active',['today','week','streak','month'][i]===v);});
  render();
}
function render(){
  var el=document.getElementById('content');
  el.className='content fade-in';
  if(VIEW==='today') el.innerHTML=buildToday();
  else if(VIEW==='week') el.innerHTML=buildWeek();
  else if(VIEW==='streak') el.innerHTML=buildStreak();
  else if(VIEW==='month') el.innerHTML=buildMonth();
}

// ── TODAY ─────────────────────────────────────────────────────────────
function buildToday(){
  var tk=todayKey();
  var steps=getSteps(tk);
  var sched=wSched();
  var tw=sched[dayAbbr()]||'💪 Workout';
  var c=getChecks();
  var done={med:!!c[tk+'_meditate'],wo:!!c[tk+'_workout'],steps:steps>=6000,aipm:!!c[tk+'_aipm'],eb1a:!!c[tk+'_eb1a']};
  var total=(done.med?1:0)+(done.wo?1:0)+(done.steps?1:0)+(done.aipm?1:0)+(done.eb1a?1:0);
  var pct=Math.round(total/5*100);
  var circ=2*Math.PI*30;
  var offset=circ*(1-pct/100);
  var rc=pct===100?'#4ade80':'#60a5fa';
  var sm=pct===100?'🎉 Full day!':pct>=60?'Solid progress':pct>=40?'Keep going':'Let\'s get started';
  var wf=getWF();
  var mn=S.get('manualWeek');
  var dw=(mn!==null&&mn>=0)?mn:weekNum();
  var at=aipmThemes();
  var et=eb1aThemes();
  var h='';
  // Ring
  h+='<div class="progress-card">'
   +'<div class="ring-wrap"><svg width="76" height="76" viewBox="0 0 76 76">'
   +'<circle cx="38" cy="38" r="30" fill="none" stroke="#27272a" stroke-width="7"/>'
   +'<circle cx="38" cy="38" r="30" fill="none" stroke="'+rc+'" stroke-width="7" stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'" stroke-linecap="round"/>'
   +'</svg><div class="ring-center" style="color:'+(pct===100?'#4ade80':'#fafafa')+'">'+pct+'%</div></div>'
   +'<div><div class="progress-title">'+sm+'</div><div class="progress-sub">'+total+'/5 tasks done today</div>'
   +'<button class="mvd-toggle'+(MVD?' on':'')+'" onclick="toggleMVD()">'+(MVD?'✦ MVD MODE ON':'TOUGH DAY? → MVD')+'</button>'
   +'</div></div>';
  if(MVD) h+='<div class="mvd-box"><div style="font-weight:600;margin-bottom:6px;">⚡ MINIMUM VIABLE DAY</div>• 10 min meditation<br/>• 10 min AI PM (read one article)<br/>• 10 min EB1A (one resume bullet)<br/><span style="color:#fef08a;font-weight:600;">30 minutes keeps your streak alive.</span></div>';
  // Health
  h+='<div class="section"><div class="section-title" style="color:#4ade80;">🏃‍♀️ HEALTH</div>'
   +ci('Meditate 10 mins','First thing, before phone',done.med,'#4ade80',"tog('"+tk+"_meditate')")
   +ci(tw,'Today\'s scheduled workout',done.wo,'#4ade80',"tog('"+tk+"_workout')")
   +'<div class="steps-row">'
   +'<div style="display:flex;align-items:center;gap:10px;">'
   +'<div class="check-box-icon" style="background:'+(done.steps?'#4ade8022':'#27272a')+';border:1px solid '+(done.steps?'#4ade8066':'#3f3f46')+';">🚶</div>'
   +'<div><div class="check-label" style="color:'+(done.steps?'#4ade80':'#e4e4e7')+'">Daily Steps</div><div class="check-sub">Target: 6,000–8,000</div></div>'
   +'</div><div style="display:flex;align-items:center;gap:6px;">'
   +'<button class="step-btn" style="background:#27272a;color:#71717a;" onclick="chSteps(\''+tk+'\',-500)">−</button>'
   +'<div><div class="step-val" style="color:'+(steps>=8000?'#4ade80':steps>=6000?'#a3e635':'#fafafa')+'">'+steps.toLocaleString()+'</div><div class="step-unit">steps</div></div>'
   +'<button class="step-btn" style="background:#27272a;color:#4ade80;" onclick="chSteps(\''+tk+'\',500)">+</button>'
   +'</div></div></div>';
  // AI PM
  h+='<div class="section"><div class="section-title" style="color:#60a5fa;">🤖 AI PM</div>'
   +'<div style="padding:10px 0;border-bottom:1px solid #1f1f23;"><div style="font-size:9px;color:#3b82f6;letter-spacing:1px;margin-bottom:5px;">THIS WEEK\'S FOCUS</div>'
   +'<div style="font-size:12px;color:#a1a1aa;line-height:1.6;">'+(wf.aipm||at[dw])+'</div></div>'
   +ci('60 min deep work block','Timer on, phone away',done.aipm,'#60a5fa',"tog('"+tk+"_aipm')")
   +'</div>';
  // EB1A
  h+='<div class="section"><div class="section-title" style="color:#f59e0b;">🏆 EB1A PROFILE</div>'
   +'<div style="padding:10px 0;border-bottom:1px solid #1f1f23;"><div style="font-size:9px;color:#d97706;letter-spacing:1px;margin-bottom:5px;">THIS WEEK\'S FOCUS</div>'
   +'<div style="font-size:12px;color:#a1a1aa;line-height:1.6;">'+(wf.eb1a||et[dw])+'</div></div>'
   +ci('45 min focused sprint','One task from week\'s theme',done.eb1a,'#f59e0b',"tog('"+tk+"_eb1a')")
   +'</div>';
  // EOD
  h+='<div class="section"><div class="section-title" style="color:#71717a;">END OF DAY · 3 QUESTIONS</div>'
   +er('Did I move my body?',done.wo||done.steps)
   +er('Did I do my deep work?',done.aipm)
   +er('Did I do my EB1A sprint?',done.eb1a)
   +'</div>';
  return h;
}
function ci(label,sub,done,color,oc){
  return '<div class="check-item" onclick="'+oc+'">'
   +'<div style="display:flex;align-items:center;gap:10px;">'
   +'<div class="check-box-icon" style="background:'+(done?color+'22':'#27272a')+';border:1px solid '+(done?color+'66':'#3f3f46')+';color:'+(done?color:'#52525b')+'">'+(done?'✓':'')+'</div>'
   +'<div><div class="check-label" style="color:'+(done?color:'#e4e4e7')+';text-decoration:'+(done?'line-through':'none')+'">'+label+'</div><div class="check-sub">'+sub+'</div></div>'
   +'</div></div>';
}
function er(q,done){return '<div class="eod-row"><div class="eod-q">'+q+'</div><div style="font-size:17px;">'+(done?'✅':'⬜')+'</div></div>';}
function toggleMVD(){MVD=!MVD;render();}
function tog(key){var c=getChecks();c[key]=!c[key];setChecks(c);render();}
function chSteps(dk,d){setSteps(dk,Math.max(0,Math.min(20000,getSteps(dk)+d)));render();}

// ── WEEK ──────────────────────────────────────────────────────────────
function pickTheme(goal,idx){
  var wf=getWF();
  wf[goal]=(goal==='aipm'?aipmThemes():eb1aThemes())[idx];
  setWF(wf);render();
}
function chWeek(d){
  var cur=S.get('manualWeek');
  var base=(cur!==null&&cur>=0)?cur:weekNum();
  S.set('manualWeek',Math.max(0,Math.min(3,base+d)));
  render();
}
function setWDay(day,type){
  var s=wSched();s[day]=type;S.set('wSched',s);render();
}

function buildWeek(){
  var wf=getWF();
  var mn=S.get('manualWeek');
  var dw=(mn!==null&&mn>=0)?mn:weekNum();
  var at=aipmThemes();
  var et=eb1aThemes();
  var asel=wf.aipm||at[dw];
  var esel=wf.eb1a||et[dw];
  var sched=wSched();
  var h='';
  // Header
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;">'
   +'<div style="font-family:\'Syne\',sans-serif;font-weight:800;font-size:16px;">Week Plan</div>'
   +'<div style="display:flex;align-items:center;gap:6px;">'
   +'<button class="month-nav" onclick="chWeek(-1)">‹</button>'
   +'<span style="font-family:\'Syne\',sans-serif;font-weight:800;font-size:14px;color:#a1a1aa;">W'+(dw+1)+'</span>'
   +'<button class="month-nav" onclick="chWeek(1)">›</button>'
   +'</div></div>'
   +'<div style="font-size:11px;color:#52525b;margin-bottom:16px;">Tap to activate · ✏️ to edit text · scroll chips to switch workout</div>';

  // Workout editor — horizontal chip scroll per day
  h+='<div class="section"><div class="section-title" style="color:#4ade80;">🏃‍♀️ WORKOUT SCHEDULE</div>';
  for(var di=0;di<DAYS.length;di++){
    var day=DAYS[di];
    var cur=sched[day]||'😴 Rest';
    h+='<div class="workout-day-row"><div class="workout-day-lbl">'+day+'</div><div class="chips-scroll">';
    for(var wi=0;wi<WTYPES.length;wi++){
      var wt=WTYPES[wi];
      h+='<div class="chip'+(cur===wt?' on':'')+'" onclick="setWDay(\''+day+'\',\''+wt+'\')">'+wt+'</div>';
    }
    h+='</div></div>';
  }
  h+='</div>';

  // AI PM themes
  h+='<div class="section"><div class="section-title" style="color:#60a5fa;">🤖 AI PM FOCUS</div>'
   +'<div style="font-size:9px;color:#3b82f6;letter-spacing:1px;margin-bottom:10px;">TAP ROW TO ACTIVATE · ✏️ TO EDIT</div>';
  for(var ai=0;ai<at.length;ai++){
    var aActive=asel===at[ai];
    h+='<div style="display:flex;gap:6px;margin-bottom:6px;align-items:stretch;">'
     +'<div onclick="pickTheme(\'aipm\','+ai+')" style="flex:1;padding:10px 12px;border-radius:8px;font-size:12px;line-height:1.5;cursor:pointer;border:1px solid '+(aActive?'#3b82f6':'#27272a')+';background:'+(aActive?'#1e3a5f':'#18181b')+';color:'+(aActive?'#93c5fd':'#71717a')+'">'
     +'<span style="color:#3b82f6;margin-right:5px;font-size:10px;">W'+(ai+1)+'</span>'+at[ai]
     +'</div>'
     +'<button onclick="openModal(\'aipm\','+ai+')" style="flex-shrink:0;width:42px;border-radius:8px;border:1px solid #3f3f46;background:#27272a;color:#a1a1aa;cursor:pointer;font-size:15px;">✏️</button>'
     +'</div>';
  }
  h+='</div>';

  // EB1A themes
  h+='<div class="section"><div class="section-title" style="color:#f59e0b;">🏆 EB1A FOCUS</div>'
   +'<div style="font-size:9px;color:#d97706;letter-spacing:1px;margin-bottom:10px;">TAP ROW TO ACTIVATE · ✏️ TO EDIT</div>';
  for(var ei=0;ei<et.length;ei++){
    var eActive=esel===et[ei];
    h+='<div style="display:flex;gap:6px;margin-bottom:6px;align-items:stretch;">'
     +'<div onclick="pickTheme(\'eb1a\','+ei+')" style="flex:1;padding:10px 12px;border-radius:8px;font-size:12px;line-height:1.5;cursor:pointer;border:1px solid '+(eActive?'#d97706':'#27272a')+';background:'+(eActive?'#2a1800':'#18181b')+';color:'+(eActive?'#fcd34d':'#71717a')+'">'
     +'<span style="color:#d97706;margin-right:5px;font-size:10px;">W'+(ei+1)+'</span>'+et[ei]
     +'</div>'
     +'<button onclick="openModal(\'eb1a\','+ei+')" style="flex-shrink:0;width:42px;border-radius:8px;border:1px solid #3f3f46;background:#27272a;color:#a1a1aa;cursor:pointer;font-size:15px;">✏️</button>'
     +'</div>';
  }
  h+='</div>';

  h+='<div class="rule-card"><div style="font-size:9px;letter-spacing:2px;color:#52525b;margin-bottom:8px;">☀️ SUNDAY PLANNING · 10 MINS</div>'
   +'1. Use ‹ › to pick your week<br/>2. Tap AI PM row to activate<br/>3. Tap EB1A row to activate<br/>'
   +'<span style="color:#52525b;">Edit any theme text with ✏️ anytime.</span></div>';
  return h;
}

// ── MODAL ─────────────────────────────────────────────────────────────
function openModal(goal,idx){
  var themes=goal==='aipm'?aipmThemes():eb1aThemes();
  MODAL_CTX={goal:goal,idx:idx,oldText:themes[idx]};
  document.getElementById('modalTitle').textContent='Edit '+(goal==='aipm'?'🤖 AI PM':'🏆 EB1A')+' — W'+(idx+1);
  document.getElementById('modalSub').textContent='Rewrite this week slot in your own words';
  document.getElementById('modalInput').value=themes[idx];
  document.getElementById('modal').style.display='flex';
  setTimeout(function(){document.getElementById('modalInput').focus();},150);
}
function closeModal(){document.getElementById('modal').style.display='none';MODAL_CTX=null;}
function saveModal(){
  if(!MODAL_CTX) return;
  var val=document.getElementById('modalInput').value.trim();
  if(!val) return;
  var key=MODAL_CTX.goal==='aipm'?'aipmT':'eb1aT';
  var defs=MODAL_CTX.goal==='aipm'?DEF_AIPM:DEF_EB1A;
  var arr=S.get(key)||defs.slice();
  var wf=getWF();
  // If the currently active focus matches the old text, update it
  if(wf[MODAL_CTX.goal]===arr[MODAL_CTX.idx]) wf[MODAL_CTX.goal]=val;
  arr[MODAL_CTX.idx]=val;
  S.set(key,arr);
  setWF(wf);
  closeModal();
  render();
}
// Close on overlay tap
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ── STREAK ────────────────────────────────────────────────────────────
function buildStreak(){
  var last7=[];
  for(var i=0;i<7;i++){var d=new Date();d.setDate(d.getDate()-(6-i));var k=d.toISOString().split('T')[0];last7.push({label:['Su','Mo','Tu','We','Th','Fr','Sa'][d.getDay()],t:dayScore(k)});}
  var perf=0,act=0;
  for(var p=0;p<last7.length;p++){if(last7[p].t===5)perf++;if(last7[p].t>0)act++;}
  var h='<div style="font-family:\'Syne\',sans-serif;font-weight:800;font-size:16px;margin-bottom:3px;">Your Streak</div>'
   +'<div style="font-size:11px;color:#52525b;margin-bottom:18px;">Last 7 days · 5 = perfect day</div>'
   +'<div class="streak-grid">';
  for(var s=0;s<last7.length;s++){
    var t=last7[s].t;
    h+='<div class="streak-bar"><div class="streak-bar-label">'+last7[s].label+'</div>'
     +'<div class="streak-bar-fill" style="background:'+(t===5?'#052e16':t>0?'#111113':'#0d0d0f')+';border-color:'+(t===5?'#4ade8066':t>0?'#27272a':'#1a1a1a')+'">'
     +'<div style="position:absolute;bottom:0;left:0;right:0;height:'+(t/5*100)+'%;background:'+(t===5?'#4ade8022':'#60a5fa11')+';transition:height 0.5s;"></div>'
     +'<div class="streak-bar-num" style="color:'+(t===5?'#4ade80':t>0?'#a1a1aa':'#3f3f46')+'">'+t+'</div>'
     +'<div class="streak-bar-den">/5</div></div></div>';
  }
  h+='</div><div class="stats-grid">'
   +'<div class="stat-card"><div class="stat-num" style="color:#4ade80;">'+perf+'</div><div class="stat-label">PERFECT DAYS</div></div>'
   +'<div class="stat-card"><div class="stat-num" style="color:#60a5fa;">'+act+'</div><div class="stat-label">ACTIVE DAYS</div></div>'
   +'</div>';
  h+='<div class="rule-card"><div style="font-size:9px;letter-spacing:2px;color:#52525b;margin-bottom:8px;">THE RULE</div>'
   +'Miss one day? That\'s okay.<br/><span style="color:#a1a1aa;">Never miss two in a row.</span><br/>'
   +'On hard days, activate <span style="color:#fef08a;">MVD mode</span> — 30 mins keeps the streak alive.</div>';
  return h;
}

// ── MONTHLY ───────────────────────────────────────────────────────────
function buildMonth(){
  var y=CAL_Y,m=CAL_M;
  var dim=new Date(y,m+1,0).getDate();
  var fdow=new Date(y,m,1).getDay();
  var ts=todayKey();
  var medC=0,woC=0,aiC=0,ebC=0,stC=0,totD=0,passD=0;
  var ds={};
  for(var d=1;d<=dim;d++){
    var dk=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var dd=dayData(dk);var sc=dayScore(dk);
    ds[d]={sc:sc,dd:dd,dk:dk};
    var ip=dk<=ts;
    if(ip){passD++;if(sc>0)totD++;if(dd.meditate)medC++;if(dd.workout)woC++;if(dd.aipm)aiC++;if(dd.eb1a)ebC++;if(dd.steps>=6000)stC++;}
  }
  var h='<div class="month-header">'
   +'<button class="month-nav" onclick="chMonth(-1)">‹</button>'
   +'<div class="month-title">'+fmtMonth(y,m)+'</div>'
   +'<button class="month-nav" onclick="chMonth(1)">›</button>'
   +'</div>';
  // Cal
  h+='<div class="section"><div class="cal-grid">';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(function(l){h+='<div class="cal-day-label">'+l+'</div>';});
  for(var fi=0;fi<fdow;fi++) h+='<div></div>';
  for(var cd=1;cd<=dim;cd++){
    var cdk=ds[cd].dk,csc=ds[cd].sc;
    var isT=cdk===ts,isFut=cdk>ts,isSel=SEL_DAY===cd&&CAL_Y===y&&CAL_M===m;
    var col=csc===5?'#4ade80':csc>=3?'#a3e635':csc>=1?'#60a5fa':'transparent';
    var bc=isT?'#fafafa':isSel?'#60a5fa':'transparent';
    h+='<div class="cal-cell" onclick="selDay('+cd+')" style="background:'+(isFut?'#111113':csc===0?'#18181b':col+'18')+';border-color:'+bc+';">'
     +'<div class="cal-num" style="color:'+(isFut?'#3f3f46':isT?'#fafafa':csc>0?col:'#71717a')+'">'+cd+'</div>'
     +(!isFut&&csc>0?'<div class="cal-dot" style="background:'+col+';opacity:0.8;"></div>':'<div class="cal-dot"></div>')
     +'</div>';
  }
  h+='</div></div>';
  // Day detail
  if(SEL_DAY&&CAL_Y===y&&CAL_M===m){
    var sd=ds[SEL_DAY];
    var sf=sd.dk>ts;
    h+='<div class="day-detail"><div class="day-detail-title">'+new Date(y,m,SEL_DAY).toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'}).toUpperCase()+' · '+(sf?'UPCOMING':sd.sc+'/5')+'</div>'
     +(sf?'<div style="font-size:12px;color:#52525b;">No data yet.</div>'
       :'<div class="detail-row"><div class="detail-label">🧘 Meditate</div><div class="detail-val">'+(sd.dd.meditate?'✅':'❌')+'</div></div>'
       +'<div class="detail-row"><div class="detail-label">💪 Workout</div><div class="detail-val">'+(sd.dd.workout?'✅':'❌')+'</div></div>'
       +'<div class="detail-row"><div class="detail-label">🚶 Steps</div><div class="detail-val" style="color:'+(sd.dd.steps>=6000?'#4ade80':'#71717a')+'">'+sd.dd.steps.toLocaleString()+'</div></div>'
       +'<div class="detail-row"><div class="detail-label">🤖 AI PM</div><div class="detail-val">'+(sd.dd.aipm?'✅':'❌')+'</div></div>'
       +'<div class="detail-row"><div class="detail-label">🏆 EB1A</div><div class="detail-val">'+(sd.dd.eb1a?'✅':'❌')+'</div></div>')
     +'</div>';
  }
  // Summary
  h+='<div class="section"><div class="section-title" style="color:#a1a1aa;">📊 MONTH SUMMARY</div>'
   +mbar('🧘 Meditate',medC,passD,'#4ade80')
   +mbar('💪 Workout',woC,passD,'#4ade80')
   +mbar('🚶 Steps 6K+',stC,passD,'#a3e635')
   +mbar('🤖 AI PM',aiC,passD,'#60a5fa')
   +mbar('🏆 EB1A',ebC,passD,'#f59e0b')
   +'</div>';
  var perf2=0;for(var pp in ds){if(ds[pp].sc===5&&ds[pp].dk<=ts)perf2++;}
  h+='<div class="stats-grid">'
   +'<div class="stat-card"><div class="stat-num" style="color:#4ade80;">'+perf2+'</div><div class="stat-label">PERFECT DAYS</div></div>'
   +'<div class="stat-card"><div class="stat-num" style="color:#60a5fa;">'+totD+'</div><div class="stat-label">ACTIVE DAYS</div></div>'
   +'</div>';
  return h;
}
function mbar(label,count,total,color){
  var pct=total>0?Math.round(count/total*100):0;
  return '<div class="month-bar-row"><div class="month-bar-label">'+label+'</div>'
   +'<div class="month-bar-track"><div class="month-bar-fill" style="width:'+pct+'%;background:'+color+';"></div></div>'
   +'<div class="month-bar-pct">'+pct+'%</div></div>';
}
function chMonth(d){CAL_M+=d;if(CAL_M>11){CAL_M=0;CAL_Y++;}if(CAL_M<0){CAL_M=11;CAL_Y--;}SEL_DAY=null;render();}
function selDay(d){SEL_DAY=(SEL_DAY===d&&CAL_Y===new Date().getFullYear()&&CAL_M===new Date().getMonth())?null:d;render();}

// ── Init ──────────────────────────────────────────────────────────────
renderHeader();
render();
</script>
